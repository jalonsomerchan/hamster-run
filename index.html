<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Hamster Run, un endless runner móvil de saltos, cacahuetes y plataformas infinitas."
    />

    <title>Hamster Run</title>

    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  </head>

  <body>
    <main class="game-shell">
      <section class="hud" aria-label="Marcador">
        <div>
          <span>Puntos</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span>Cacahuetes</span>
          <strong id="peanuts">0</strong>
        </div>
        <div>
          <span>Tiempo</span>
          <strong id="time">0s</strong>
        </div>
      </section>

      <canvas id="game" aria-label="Hamster Run"></canvas>

      <section id="menu" class="overlay is-visible" aria-label="Menú de nivel">
        <div class="panel">
          <p class="eyebrow">Endless Runner</p>
          <h1>Hamster Run</h1>
          <p class="copy">
            Atrapa cacahuetes, evita enemigos y no te caigas entre plataformas.
          </p>

          <div class="level-grid" id="levelGrid"></div>

          <button id="startButton" class="primary-button" type="button">Jugar</button>
          <p class="hint">Toca la pantalla para saltar. Toca otra vez en el aire para doble salto.</p>
        </div>
      </section>

      <section id="gameOver" class="overlay" aria-label="Fin de partida">
        <div class="panel">
          <p class="eyebrow">Fin de carrera</p>
          <h2>Te has caído</h2>
          <div class="result-grid">
            <div>
              <span>Puntos</span>
              <strong id="finalScore">0</strong>
            </div>
            <div>
              <span>Cacahuetes</span>
              <strong id="finalPeanuts">0</strong>
            </div>
            <div>
              <span>Tiempo</span>
              <strong id="finalTime">0s</strong>
            </div>
          </div>
          <button id="retryButton" class="primary-button" type="button">Reintentar</button>
          <button id="levelsButton" class="ghost-button" type="button">Cambiar nivel</button>
        </div>
      </section>
    </main>

    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
